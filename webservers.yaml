 # 1. Install Docker (The Container Engine)
- name: Install software
  hosts: local
  becomes: yes

  tasks:
    - name: 'INstall docker'
      apt:
        name: [apt-transport-https, ca-certificates, curl, software-properties-common]
        status: latest
        update_cache: true 

    - name: Add docker GPG Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        status: latest
        update_cache: true

    - name: Add docker repository 
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
        state: latest

    - name: Add docker Engine
      apt:
        name: docker_ce
        state: latest

  #2. install jenkins
- name: install java 17
  apt:
    name: openjdk-17-jdk
    state: present

- name: add jenkins gpg
  apt_key: 
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    state: latest
    udpate_cache: true

- name: add jenkins repo
  apt_repository:
    repo: deb https://pkg.jenkins.io/debian-stable binary/
    state: latest

- name: install jenkins
  apt:
    name: jenkins
    state: present

#3  Permissions & Services
- name: add ubuntu and jenkins to docker group
  user:
    name: {{ item}} 
    groups: docker
    append: yes
  loop:
    - ubuntu
    - Jenkins

- name: ensure things doing right
  systemd: 
    name: "{{ item }}"
    state: started
    enabled: yes
  loop: [docker, jenkins]


 # 1. Install Docker (The Container Engine)
- name: Install software
  hosts: local
  connection: localhost
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true


    - name: Ensure dependencies are installed
      ansible.builtin.package:
        name: 
          - bc
          - curl
          - expect
          - git
          - ca-certificates
        state: present

    - name: Add docker gpg key path
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"  

    - name: Add docker GPG Key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add docker repository 
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
    
    - name: Update apt cache after adding docker repository
      ansible.builtin.apt:
        update_cache: true

    - name: Add docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

  #2. install jenkins
    - name: Install java 17
      ansible.builtin.apt:
        name: openjdk-17-jdk
        state: present

    - name: Add jenkins gpg key path
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add jenkins gpg
      ansible.builtin.get_url: 
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins.asc
        mode: "0644"

    - name: Add jenkins repo
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/jenkins.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins
        update_cache: yes

    - name: Install jenkins
      ansible.builtin.apt:
        name: jenkins
        state: present
        update_cache: true

#3  Permissions & Services
    - name: Add ubuntu and jenkins to docker group
      ansible.builtin.user:
        name: "{{ item }}" 
        groups: docker
        append: true
      loop:
        - ubuntu
        - jenkins 

    - name: Ensure things doing right
      ansible.builtin.systemd: 
        name: "{{ item }}"
        state: started
        enabled: true
      loop: [docker, jenkins]

